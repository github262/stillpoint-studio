#version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: stillpoint_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: stillpoint
      MYSQL_USER: stillpoint_user
      MYSQL_PASSWORD: stillpoint_1234
    ports:
      - "3306:3306"
    volumes:
      - stillpoint_mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password

volumes:
  stillpoint_mysql_data: